name: Publish Thursday Posts & Send Email

on:
  schedule:
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish posts, generate RSS, send email
        run: node publish.js
        env:
          BREVO_API_KEY:  ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID:  ${{ secrets.BREVO_LIST_ID }}
          SENDER_EMAIL:   ${{ secrets.SENDER_EMAIL }}

      - name: Commit changes if any
        run: |
          git config user.name  "THH Bot"
          git config user.email "bot@thehelpinghand.club"
          git add posts.json rss.xml
          git diff --staged --quiet || git commit -m "Thursday publish: $(date '+%d %b %Y')"
          git push
